name: Dependabot Full-Auto Approve & Merge

on: pull_request_target

permissions:
  pull-requests: write
  contents: write

# 防止同一 PR 的多次运行互相干扰
concurrency:
  group: dependabot-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  dependabot:
    runs-on: ubuntu-latest
    # 记得把 owner/repo 换成你自己的
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.repository == 'thTag/docs'
    steps:
      - name: 📋 Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3

      - name: ✅ Approve if not already approved
        run: |
          REVIEW_DECISION=$(gh pr view "$PR_URL" --json reviewDecision -q .reviewDecision)
          
          if [ "$REVIEW_DECISION" != "APPROVED" ]; then
            gh pr review --approve "$PR_URL"
            echo "PR 已由机器人成功审批！"
          else
            echo "PR 已经是 APPROVED 状态，跳过重复审批。"
          fi
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔄 Enable auto-merge (Squash & Merge)
        # 移除了所有依赖名和版本类型的限制
        run: gh pr merge --auto --merge-method squash --admin --fill "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
